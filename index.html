<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3405 Sandy Trail — Resident Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;
  --surface:#ffffff;
  --surface2:#F8FAFC;
  --border:#E2E8F0;
  --border2:#CBD5E1;
  --text:#0F172A;
  --muted:#64748B;
  --muted2:#94A3B8;
  --accent:#1E3A5F;
  --accent-light:#EEF3FA;
  --accent-mid:#3B6EA5;
  --accent2:#2563EB;
  --sans:'Geist','Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .25s ease both;}
input,select,textarea,button{font-family:var(--sans);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent2);outline-offset:1px;}
@media(max-width:800px){
  .nav-full{display:none!important;}
  .grid-2{grid-template-columns:1fr!important;}
  .grid-3{grid-template-columns:1fr!important;}
  header{padding:0 20px!important;}
  .page-wrap{padding:32px 20px!important;}
  .emergency-bar{padding:12px 20px!important;}
  footer{padding:16px 20px!important;flex-direction:column;gap:6px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

/* ── primitives ── */
const Tag = ({children,color=‘var(–accent-mid)’}) => (
<span style={{fontSize:10,letterSpacing:‘0.08em’,textTransform:‘uppercase’,color,fontWeight:600,display:‘block’,marginBottom:8}}>{children}</span>
);
const H1 = ({children}) => (

  <h1 style={{fontFamily:'var(--sans)',fontSize:'clamp(28px,4vw,44px)',fontWeight:600,lineHeight:1.15,color:'var(--text)',letterSpacing:'-0.02em'}}>{children}</h1>
);
const H2 = ({children,mb=20}) => (
  <h2 style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:600,lineHeight:1.3,marginBottom:mb,color:'var(--text)',letterSpacing:'-0.01em'}}>{children}</h2>
);
const Muted = ({children,style={}}) => (
  <p style={{color:'var(--muted)',fontSize:13.5,lineHeight:1.7,...style}}>{children}</p>
);
const InfoRow = ({label,value}) => (
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',padding:'10px 0',borderBottom:'1px solid var(--border)',gap:16}}>
    <span style={{fontSize:12,color:'var(--muted)',flexShrink:0}}>{label}</span>
    <span style={{fontSize:13,color:'var(--text)',textAlign:'right',fontWeight:500}}>{value}</span>
  </div>
);
const Highlight = ({children,style={}}) => (
  <div style={{background:'var(--accent-light)',border:'1px solid #BFCFE8',borderRadius:8,padding:'14px 18px',fontSize:12.5,color:'var(--accent)',lineHeight:1.7,...style}}>{children}</div>
);
const Warn = ({children}) => (
  <div style={{background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:8,padding:'14px 18px',fontSize:12.5,color:'#92400E',lineHeight:1.7}}>{children}</div>
);
const Btn = ({children,href,onClick,outline=false,full=false}) => {
  const base = {display:'inline-flex',alignItems:'center',gap:8,fontFamily:'var(--sans)',fontSize:13,
    fontWeight:500,padding:'9px 18px',borderRadius:6,
    textDecoration:'none',cursor:'pointer',transition:'all .15s',width:full?'100%':'auto',justifyContent:full?'center':'flex-start'};
  const s = outline
    ? {...base,background:'transparent',color:'var(--text)',border:'1px solid var(--border)'}
    : {...base,background:'var(--accent)',color:'#fff',border:'none'};
  if(href) return <a href={href} target="_blank" rel="noreferrer" style={s}>{children}</a>;
  return <button style={s} onClick={onClick}>{children}</button>;
};
const Step = ({n,title,desc}) => (
  <div style={{display:'flex',gap:14,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
    <span style={{fontSize:13,color:'var(--muted2)',lineHeight:1.6,flexShrink:0,width:22,fontWeight:600}}>{n}.</span>
    <div>
      <div style={{fontSize:13,fontWeight:500,marginBottom:2,color:'var(--text)'}}>{title}</div>
      {desc && <div style={{fontSize:12,color:'var(--muted)'}}>{desc}</div>}
    </div>
  </div>
);
const Card = ({icon,label,value,sub}) => (
  <div style={{background:'var(--surface2)',border:'1px solid var(--border)',padding:20,borderRadius:8}}>
    {icon && <div style={{fontSize:22,marginBottom:8}}>{icon}</div>}
    <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--muted)',marginBottom:4,fontWeight:500}}>{label}</div>
    <div style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>{value}</div>
    {sub && <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{sub}</div>}
  </div>
);
const PageWrap = ({children}) => (
  <div className="page-wrap fade" style={{padding:'52px 48px',maxWidth:1140,margin:'0 auto'}}>{children}</div>
);
const PageHeader = ({tag,title,intro}) => (
  <div style={{marginBottom:40,paddingBottom:32,borderBottom:'1px solid var(--border)'}}>
    <Tag>{tag}</Tag>
    <H1>{title}</H1>
    {intro && <Muted style={{marginTop:10,maxWidth:580}}>{intro}</Muted>}
  </div>
);
const Panel = ({children,style={}}) => (
  <div style={{background:'var(--surface)',border:'1px solid var(--border)',padding:28,borderRadius:10,...style}}>{children}</div>
);
